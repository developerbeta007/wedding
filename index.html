<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Veena ❤️ Naveen</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      height: 100vh;

      /* Soft green + white gradient */
      background: linear-gradient(135deg, #e8f5e9, #ffffff);

      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* Subtle texture overlay */
    body::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: url('https://www.transparenttextures.com/patterns/cream-paper.png');
      opacity: 0.3;
      z-index: 0;
    }

    .card {
      width: 360px;
      height: 600px;
      background: #ffffff;
      border-radius: 20px;
      padding: 20px;
      text-align: center;

      /* Gold border */
      border: 2px solid #d4af37;

      /* Elegant shadow */
      box-shadow: 0 15px 40px rgba(0,0,0,0.1);

      position: relative;
      overflow: hidden;
      z-index: 1;
    }

    /* Floral decorations */
    .card::before,
    .card::after {
      content: "";
      position: absolute;
      width: 160px;
      height: 160px;
      background-size: cover;
      opacity: 0.25;
    }

    .card::before {
      top: -20px;
      left: -20px;
      background-image: url('https://i.ibb.co/6JQ0V1V/floral1.png');
    }

    .card::after {
      bottom: -20px;
      right: -20px;
      background-image: url('https://i.ibb.co/Z2Xk6Ww/floral2.png');
    }

    .ganesha {
      font-size: 36px;
      margin-bottom: 5px;
    }

    .title {
      font-family: 'Great Vibes', cursive;
      font-size: 36px;
      color: #2e7d32;
    }

    .names {
      font-size: 26px;
      margin: 10px 0;
      color: #1b5e20;
      font-weight: 500;
    }

    button {
      margin-top: 12px;
      padding: 10px 20px;
      border-radius: 25px;
      border: none;
      background: linear-gradient(45deg, #66bb6a, #43a047);
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      transform: scale(1.05);
    }

    .info {
      margin-top: 12px;
      font-size: 15px;
      color: #333;
    }

    .hidden {
      opacity: 0;
      transform: translateY(20px);
      transition: 0.5s;
    }

    .show {
      opacity: 1;
      transform: translateY(0);
    }

    .footer {
      position: absolute;
      bottom: 20px;
      width: 100%;
      left: 0;
      font-size: 13px;
      color: #555;
    }

  </style>
</head>

<body>

<div class="card">

  <div class="ganesha">🪔</div>

  <div class="title">Wedding Invitation</div>

  <div class="names">
    Veena ❤️ Naveen
  </div>

  <button onclick="revealDate()">Tap to Reveal Date</button>

  <div id="date" class="info hidden">
    📅 03 May 2026 <br/>
    ⏰ 9:00 AM – 10:30 AM
  </div>

  <button onclick="revealVenue()">Tap to Reveal Venue</button>

  <div id="venue" class="info hidden">
    📍 Girija Kalyana Mantapa<br/>
    Vijipura
  </div>

  <div class="footer">
    With the blessings of our parents,<br/>
    we invite you to celebrate with us 💕
  </div>

</div>

<script>
  function revealDate() {
    document.getElementById("date").classList.add("show");
  }

  function revealVenue() {
    document.getElementById("venue").classList.add("show");
  }
</script>

</body>
</html>
